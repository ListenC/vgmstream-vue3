name: Build Web

on:
  push:
    branches: [ main, master ]  # 推代码就自动打包
  workflow_dispatch:            # 也可以手动点一下打包

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web (only)
        run: npm run build  # 只执行打包，生成 dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist